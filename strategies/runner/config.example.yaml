# 統合ランナー設定
# APIパスワードは環境変数 KABU_API_PASSWORD から読み込みます（このファイルには書きません）。
# "production" (本番環境・ポート18080) または "demo" (検証環境・ポート18081)
# 注意: 検証環境は発注テスト専用で、銘柄登録は空が返りPUSH配信も流れない。
environment: production

# 監視銘柄は全ストラテジー共通の外部ファイルで管理する（このconfigからの相対パス）。
# 銘柄の追加・入れ替えは ../symbols.yaml を編集する。
# このファイルに symbols: を直接書いた場合はそちらが優先される（単一銘柄でのテスト用）。
symbols_file: ../symbols.yaml

# デバッグ: 起動直後N件のPUSH生データをそのままログ出力する
debug_raw_messages: 20

# ── 各ストラテジーの有効/無効と閾値 ──
# enabled: false にすればそのストラテジーだけ止められる（他は動き続ける）
strategies:

  # 小口売り連続検知（気配にぶつかる小口売りがN回連続 → 需給改善の兆し）
  small_lot_sell_detector:
    enabled: true
    small_lot_threshold: 300      # この株数以下を「小口」とみなす
    price_tolerance_ticks: 0      # 最良買い気配との価格差の許容ティック数
    min_hit_interval_seconds: 1.0 # アルゴ分散売り対策: この秒数未満で連射される小口売りはカウントしない
    alert_tiers:
      - consecutive: 5
        label: "WATCH"
      - consecutive: 10
        label: "STRONG"

  # 投げ売り検知（安値圏でOVER急減 → ほぼ同数が売り直し/ぶつけで降りてくる）
  panic_sell_detector:
    enabled: true
    over_drop_threshold: 3000      # OVER小銘柄向け: この株数以上の減少でイベント
    large_over_threshold: 100000   # この株数を超えるOVERを持つ銘柄は割合判定に切り替え
    large_over_drop_pct: 0.10      # OVER大銘柄向け: 直前のOVERの10%以上の減少でイベント
    match_tolerance: 0.2           # 「ほぼ同数」の許容誤差（80%以上で成立）
    match_window_seconds: 30       # イベント発生後の監視時間窓
    low_zone_pct: 0.007            # 当日安値からこの割合以内を「安値圏」とする
    requote_levels: 3              # 「売り気配周辺」とみなす板の本数
    requote_consumed_fraction: 0.5 # ABSORBED通知に必要な消化割合
    price_tolerance_ticks: 0

  # UNDER急増検知（安値圏でUNDERが一気に増加・OVERほぼ不変 → 下値に大口買い）
  under_surge_detector:
    enabled: true
    under_increase_pct: 0.20        # UNDER急増とみなす1更新あたりの増加割合
    over_change_tolerance_pct: 0.05 # 「OVERほぼ不変」の許容変化割合
    low_zone_pct: 0.01              # 当日安値からこの割合以内を「安値圏」とする
    cooldown_seconds: 60            # 同一銘柄の連続通知の抑制間隔（秒）
    quiet_windows:                  # 板寄せ直後の通知抑制時間帯
      - "09:00-09:01"
      - "12:30-12:31"
